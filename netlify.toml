# VitaBahn — HADP investor brief
# Static site, no build step. The lead form uses Netlify Forms (see README.md).

[build]
  publish = "."
  command = ""

# Self-hosted IBM Plex woff2 files never change once deployed -> cache hard.
[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Confidential investor brief: reinforce noindex + sensible hardening headers.
[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
